# ============================================================
# 养基发财 - Fund Tracker Nginx 配置示例
# 部署路径：/etc/nginx/sites-available/fund-tracker
# 启用方式：ln -s /etc/nginx/sites-available/fund-tracker /etc/nginx/sites-enabled/
#
# ⚠️ 重要部署注意事项：
# 1. ICP 备案：中国大陆服务器必须完成 ICP 备案，否则手机浏览器无法访问
#    - 未备案域名会被云服务商在网络层拦截，请求无法到达 nginx
#    - 电脑浏览器可能因缓存/不同网络路径暂时可访问，但手机浏览器会被拦截
#    - 微信内置浏览器使用 HTTPDNS + 自有通道，可能绕过拦截
# 2. IPv6：如果服务器没有公网 IPv6 地址，务必注释掉 IPv6 监听（见下方）
#    - 手机网络优先使用 IPv6，若域名有 AAAA 记录但服务器 IPv6 不通会导致连接失败
#    - 同时需在 DNS 控制台删除域名的 AAAA 记录
# 3. SSL 证书链：确保证书文件包含完整证书链（fullchain.pem），手机浏览器校验更严格
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    # listen [::]:80;  # ⚠️ 无 IPv6 时注释掉，并删除 DNS 的 AAAA 记录
    server_name fund.example.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    # listen [::]:443 ssl http2;  # ⚠️ 无 IPv6 时注释掉，并删除 DNS 的 AAAA 记录
    server_name fund.example.com;

    # ----------------------------------------------------------
    # SSL 证书（Certbot 自动生成，替换为你的实际路径）
    # ----------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/fund.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fund.example.com/privkey.pem;

    # SSL 安全参数
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（强制 HTTPS，启用前确认 HTTPS 正常工作）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ----------------------------------------------------------
    # 安全响应头
    # ----------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # 前端静态文件（Vite 构建产物）
    # ----------------------------------------------------------
    root /opt/fund-tracker/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（Vite 构建后文件名含 hash，可安全设置长过期时间）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html 不缓存（确保每次获取最新版本）
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # ----------------------------------------------------------
    # 后端 API 反向代理
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # 请求头透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 文件上传大小限制（Excel 导入）
        client_max_body_size 10m;
        client_body_buffer_size 128k;
    }

    # ----------------------------------------------------------
    # APK 安装包下载（优化大文件传输）
    # ----------------------------------------------------------
    location /download/ {
        alias /opt/fund-tracker/web/dist/download/;

        # 强制下载（不直接在浏览器打开）
        types {
            application/vnd.android.package-archive apk;
        }
        add_header Content-Disposition 'attachment';

        # 启用断点续传
        aio on;
        directio 512;

        # 限制下载速度（可选，防止带宽耗尽）
        # limit_rate 1m;

        # 下载链接有效期缓存（文件名不含 hash，设置较短过期时间）
        expires 7d;
        add_header Cache-Control "public";

        # 访问日志（记录下载统计）
        access_log /var/log/nginx/fund-tracker-download.log;
    }

    # ----------------------------------------------------------
    # Gzip 压缩（⚠️ 关键优化：带宽不足时压缩是最有效的提速手段）
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;         # 压缩级别 1-9，6 是性能和压缩率的最佳平衡
    gzip_min_length 256;       # 从1024降到256，小文件也压缩（低带宽下每KB都重要）
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon
        font/woff2
        font/woff
        font/ttf;

    # ----------------------------------------------------------
    # 禁止访问隐藏文件
    # ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------
    # 日志
    # ----------------------------------------------------------
    access_log /var/log/nginx/fund-tracker-access.log;
    error_log  /var/log/nginx/fund-tracker-error.log;
}
